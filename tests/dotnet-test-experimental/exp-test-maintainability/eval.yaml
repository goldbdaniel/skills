scenarios:
  - name: "Identify duplicated test setup and recommend builder extraction"
    prompt: |
      I want to improve the maintainability of these tests. There's a lot of repetitive
      setup and I find myself copying blocks of code whenever I add a new test.
      Can you assess the maintainability and suggest improvements?

      ```csharp
      using Microsoft.VisualStudio.TestTools.UnitTesting;

      namespace Checkout.Tests;

      [TestClass]
      public sealed class OrderProcessorTests
      {
          [TestMethod]
          public void ProcessOrder_StandardShipping_CalculatesCorrectTotal()
          {
              var customer = new Customer
              {
                  Id = 1,
                  Name = "Alice Smith",
                  Email = "alice@example.com",
                  MembershipTier = "Gold",
                  IsActive = true
              };
              var order = new Order
              {
                  CustomerId = customer.Id,
                  Items = new List<OrderItem>
                  {
                      new OrderItem { ProductId = 101, Name = "Widget", Price = 29.99m, Quantity = 2 },
                      new OrderItem { ProductId = 102, Name = "Gadget", Price = 49.99m, Quantity = 1 }
                  },
                  ShippingMethod = "Standard"
              };
              var processor = new OrderProcessor(new FakeTaxService(), new FakeInventory());

              var result = processor.Process(order, customer);

              Assert.AreEqual(109.97m, result.Subtotal);
              Assert.AreEqual("Standard", result.ShippingMethod);
          }

          [TestMethod]
          public void ProcessOrder_ExpressShipping_AddsExpressFee()
          {
              var customer = new Customer
              {
                  Id = 1,
                  Name = "Alice Smith",
                  Email = "alice@example.com",
                  MembershipTier = "Gold",
                  IsActive = true
              };
              var order = new Order
              {
                  CustomerId = customer.Id,
                  Items = new List<OrderItem>
                  {
                      new OrderItem { ProductId = 101, Name = "Widget", Price = 29.99m, Quantity = 2 },
                      new OrderItem { ProductId = 102, Name = "Gadget", Price = 49.99m, Quantity = 1 }
                  },
                  ShippingMethod = "Express"
              };
              var processor = new OrderProcessor(new FakeTaxService(), new FakeInventory());

              var result = processor.Process(order, customer);

              Assert.IsTrue(result.Total > 109.97m);
              Assert.AreEqual("Express", result.ShippingMethod);
          }

          [TestMethod]
          public void ProcessOrder_GoldMember_AppliesDiscount()
          {
              var customer = new Customer
              {
                  Id = 2,
                  Name = "Bob Jones",
                  Email = "bob@example.com",
                  MembershipTier = "Gold",
                  IsActive = true
              };
              var order = new Order
              {
                  CustomerId = customer.Id,
                  Items = new List<OrderItem>
                  {
                      new OrderItem { ProductId = 201, Name = "Premium Widget", Price = 99.99m, Quantity = 1 }
                  },
                  ShippingMethod = "Standard"
              };
              var processor = new OrderProcessor(new FakeTaxService(), new FakeInventory());

              var result = processor.Process(order, customer);

              Assert.IsTrue(result.DiscountApplied);
              Assert.IsTrue(result.Total < 99.99m);
          }

          [TestMethod]
          public void ProcessOrder_InactiveCustomer_Throws()
          {
              var customer = new Customer
              {
                  Id = 3,
                  Name = "Charlie Brown",
                  Email = "charlie@example.com",
                  MembershipTier = "Silver",
                  IsActive = false
              };
              var order = new Order
              {
                  CustomerId = customer.Id,
                  Items = new List<OrderItem>
                  {
                      new OrderItem { ProductId = 101, Name = "Widget", Price = 29.99m, Quantity = 1 }
                  },
                  ShippingMethod = "Standard"
              };
              var processor = new OrderProcessor(new FakeTaxService(), new FakeInventory());

              Assert.ThrowsException<InvalidOperationException>(
                  () => processor.Process(order, customer));
          }

          [TestMethod]
          public void ProcessOrder_EmptyCart_Throws()
          {
              var customer = new Customer
              {
                  Id = 1,
                  Name = "Alice Smith",
                  Email = "alice@example.com",
                  MembershipTier = "Gold",
                  IsActive = true
              };
              var order = new Order
              {
                  CustomerId = customer.Id,
                  Items = new List<OrderItem>(),
                  ShippingMethod = "Standard"
              };
              var processor = new OrderProcessor(new FakeTaxService(), new FakeInventory());

              Assert.ThrowsException<ArgumentException>(
                  () => processor.Process(order, customer));
          }
      }
      ```
    assertions:
      - type: "output_matches"
        pattern: "(builder|factory|helper|Create.*Customer|Create.*Order|Build)"
      - type: "output_matches"
        pattern: "(duplicat|repeat|copied|boilerplate|identical)"
      - type: "output_matches"
        pattern: "(before|after|refactor)"
      - type: "exit_success"
    rubric:
      - "Identified that Customer and Order construction is duplicated across all 5 tests with minor variations"
      - "Suggested extracting a builder or factory method to centralize object construction"
      - "Showed concrete before/after refactored code that reduces per-test boilerplate"
      - "Demonstrated that adding a new test case becomes significantly shorter after the refactoring"
      - "Did not recommend unnecessary abstractions for the simple OrderProcessor or FakeTaxService construction"
    timeout: 120

  - name: "Recommend data-driven patterns with display names for unclear parameters"
    prompt: |
      I need to add more test cases for our validation logic but each new case needs a whole new method.
      Can you suggest a better structure?

      ```csharp
      using Microsoft.VisualStudio.TestTools.UnitTesting;

      namespace Validation.Tests;

      [TestClass]
      public sealed class InputValidatorTests
      {
          [TestMethod]
          public void Validate_EmptyString_ReturnsFalse()
          {
              var validator = new InputValidator();
              var result = validator.Validate("");
              Assert.IsFalse(result.IsValid);
              Assert.AreEqual("Input cannot be empty", result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_TooShort_ReturnsFalse()
          {
              var validator = new InputValidator();
              var result = validator.Validate("ab");
              Assert.IsFalse(result.IsValid);
              Assert.AreEqual("Input must be at least 3 characters", result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_TooLong_ReturnsFalse()
          {
              var validator = new InputValidator();
              var result = validator.Validate(new string('x', 256));
              Assert.IsFalse(result.IsValid);
              Assert.AreEqual("Input must not exceed 255 characters", result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_ContainsSpecialChars_ReturnsFalse()
          {
              var validator = new InputValidator();
              var result = validator.Validate("hello<script>");
              Assert.IsFalse(result.IsValid);
              Assert.AreEqual("Input contains invalid characters", result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_ValidInput_ReturnsTrue()
          {
              var validator = new InputValidator();
              var result = validator.Validate("hello-world");
              Assert.IsTrue(result.IsValid);
              Assert.IsNull(result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_MinLength_ReturnsTrue()
          {
              var validator = new InputValidator();
              var result = validator.Validate("abc");
              Assert.IsTrue(result.IsValid);
              Assert.IsNull(result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_MaxLength_ReturnsTrue()
          {
              var validator = new InputValidator();
              var result = validator.Validate(new string('a', 255));
              Assert.IsTrue(result.IsValid);
              Assert.IsNull(result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_Null_ReturnsFalse()
          {
              var validator = new InputValidator();
              var result = validator.Validate(null);
              Assert.IsFalse(result.IsValid);
              Assert.AreEqual("Input cannot be empty", result.ErrorMessage);
          }

          [TestMethod]
          public void Validate_WhitespaceOnly_ReturnsFalse()
          {
              var validator = new InputValidator();
              var result = validator.Validate("   ");
              Assert.IsFalse(result.IsValid);
              Assert.AreEqual("Input cannot be empty", result.ErrorMessage);
          }
      }
      ```
    assertions:
      - type: "output_matches"
        pattern: "(DataRow|InlineData|TestCase|data.driven|parameteriz)"
      - type: "output_matches"
        pattern: "(DisplayName|display.name)"
      - type: "exit_success"
    rubric:
      - "Identified that the invalid-input tests can be consolidated into a parameterized test with DataRow"
      - "Identified that the valid-input tests can similarly be consolidated"
      - "Recommended using DisplayName parameters to label each test case clearly, especially for non-obvious inputs like boundary lengths"
      - "Showed concrete refactored code with descriptive display names"
      - "Acknowledged that the tests are otherwise well-structured (focused, clear assertions, proper naming)"
    timeout: 120

  - name: "Recognize well-maintained tests that need minimal changes"
    prompt: |
      Can you review these tests for maintainability? I want to make sure they'll be easy
      to update as the codebase evolves.

      ```csharp
      using Microsoft.VisualStudio.TestTools.UnitTesting;

      namespace Auth.Tests;

      [TestClass]
      public sealed class TokenServiceTests
      {
          [TestMethod]
          [DataRow("user@example.com", "admin", DisplayName = "Admin user gets full-access token")]
          [DataRow("viewer@example.com", "viewer", DisplayName = "Viewer gets read-only token")]
          [DataRow("api@example.com", "service", DisplayName = "Service account gets API token")]
          public void GenerateToken_ValidUser_ReturnsTokenWithCorrectRole(string email, string role)
          {
              var service = CreateTokenService();

              var token = service.GenerateToken(email, role);

              Assert.IsNotNull(token);
              Assert.AreEqual(role, token.Role);
              Assert.IsTrue(token.ExpiresAt > DateTime.UtcNow);
          }

          [TestMethod]
          public void GenerateToken_ExpiredCredentials_ThrowsAuthException()
          {
              var service = CreateTokenService(clockOffset: TimeSpan.FromDays(-1));

              Assert.ThrowsException<AuthenticationException>(
                  () => service.GenerateToken("user@example.com", "admin"));
          }

          [TestMethod]
          public void RevokeToken_ValidToken_MarksRevoked()
          {
              var service = CreateTokenService();
              var token = service.GenerateToken("user@example.com", "admin");

              service.RevokeToken(token.Id);

              Assert.IsTrue(service.IsRevoked(token.Id));
          }

          [TestMethod]
          public void RevokeToken_AlreadyRevoked_IsIdempotent()
          {
              var service = CreateTokenService();
              var token = service.GenerateToken("user@example.com", "admin");
              service.RevokeToken(token.Id);

              service.RevokeToken(token.Id); // second call

              Assert.IsTrue(service.IsRevoked(token.Id));
          }

          private static TokenService CreateTokenService(TimeSpan? clockOffset = null)
          {
              var clock = clockOffset.HasValue
                  ? new FakeClock(DateTimeOffset.UtcNow + clockOffset.Value)
                  : new FakeClock(DateTimeOffset.UtcNow);
              return new TokenService(clock, new InMemoryTokenStore());
          }
      }
      ```
    assertions:
      - type: "output_matches"
        pattern: "(well.maintained|good shape|clean|solid|maintainable|easy to maintain|no.*(major|significant))"
      - type: "output_not_contains"
        value: "builder pattern"
      - type: "exit_success"
    rubric:
      - "Recognized that these tests are already well-maintained and need no major refactoring"
      - "Acknowledged the existing helper method (CreateTokenService) as a good pattern"
      - "Acknowledged the use of DataRow with descriptive DisplayName values"
      - "Did not recommend unnecessary abstractions like a builder pattern for simple test setup"
      - "If any suggestions were made, they were minor and clearly labeled as optional polish"
    timeout: 120

  - name: "Identify oversized tests that test multiple concerns"
    prompt: |
      I'd like to improve the maintainability of this test class. The tests are hard to
      read and modify — can you suggest how to restructure them for better readability
      and easier maintenance?

      ```csharp
      using Microsoft.VisualStudio.TestTools.UnitTesting;

      namespace Reporting.Tests;

      [TestClass]
      public sealed class ReportGeneratorTests
      {
          [TestMethod]
          public void GenerateMonthlyReport_ProducesCorrectOutput()
          {
              // Setup database
              var db = new InMemoryDatabase();
              db.AddUser(new User(1, "Alice", "Engineering"));
              db.AddUser(new User(2, "Bob", "Engineering"));
              db.AddUser(new User(3, "Charlie", "Sales"));
              db.AddTimeEntry(new TimeEntry(1, new DateTime(2025, 1, 5), 8));
              db.AddTimeEntry(new TimeEntry(1, new DateTime(2025, 1, 6), 7.5));
              db.AddTimeEntry(new TimeEntry(2, new DateTime(2025, 1, 5), 8));
              db.AddTimeEntry(new TimeEntry(2, new DateTime(2025, 1, 7), 6));
              db.AddTimeEntry(new TimeEntry(3, new DateTime(2025, 1, 5), 8));
              db.AddTimeEntry(new TimeEntry(3, new DateTime(2025, 1, 8), 9));
              db.AddProject(new Project(1, "Alpha", "Engineering"));
              db.AddProject(new Project(2, "Beta", "Sales"));
              db.AddProjectAssignment(1, 1); // Alice -> Alpha
              db.AddProjectAssignment(2, 1); // Bob -> Alpha
              db.AddProjectAssignment(3, 2); // Charlie -> Beta

              // Generate report
              var generator = new ReportGenerator(db, new FakeEmailSender());
              var report = generator.GenerateMonthlyReport(2025, 1);

              // Verify report metadata
              Assert.AreEqual("January 2025", report.Title);
              Assert.AreEqual(2025, report.Year);
              Assert.AreEqual(1, report.Month);

              // Verify department summaries
              Assert.AreEqual(2, report.DepartmentSummaries.Count);
              var engineering = report.DepartmentSummaries.First(d => d.Name == "Engineering");
              Assert.AreEqual(29.5, engineering.TotalHours);
              Assert.AreEqual(2, engineering.EmployeeCount);
              var sales = report.DepartmentSummaries.First(d => d.Name == "Sales");
              Assert.AreEqual(17.0, sales.TotalHours);
              Assert.AreEqual(1, sales.EmployeeCount);

              // Verify individual entries
              Assert.AreEqual(3, report.EmployeeDetails.Count);
              var alice = report.EmployeeDetails.First(e => e.Name == "Alice");
              Assert.AreEqual(15.5, alice.TotalHours);
              Assert.AreEqual(2, alice.DaysWorked);
              var bob = report.EmployeeDetails.First(e => e.Name == "Bob");
              Assert.AreEqual(14.0, bob.TotalHours);
              var charlie = report.EmployeeDetails.First(e => e.Name == "Charlie");
              Assert.AreEqual(17.0, charlie.TotalHours);

              // Verify project allocation
              Assert.AreEqual(2, report.ProjectSummaries.Count);
              Assert.IsTrue(report.ProjectSummaries.Any(p => p.Name == "Alpha"));
              Assert.IsTrue(report.ProjectSummaries.Any(p => p.Name == "Beta"));

              // Verify email was sent
              var emailSender = (FakeEmailSender)generator.EmailSender;
              Assert.AreEqual(1, emailSender.SentEmails.Count);
              Assert.IsTrue(emailSender.SentEmails[0].Subject.Contains("January 2025"));
          }
      }
      ```
    assertions:
      - type: "output_matches"
        pattern: "(too (large|long|big)|oversized|multi.?concern|multiple.*(behavior|thing|concern)|split|break.*(up|apart|into))"
      - type: "output_matches"
        pattern: "(helper|factory|builder|Create.*|Setup.*|Build)"
      - type: "exit_success"
    rubric:
      - "Identified that the test is too large and verifies multiple independent concerns (metadata, departments, employees, projects, email)"
      - "Recommended splitting into focused tests that each verify one aspect of the report"
      - "Recommended extracting a helper for the complex database setup so it can be shared across the split tests"
      - "Showed concrete refactored code or a clear outline of what the split tests would look like"
      - "Explained why splitting the test would make failures more diagnostic and the test less fragile"
    timeout: 120
